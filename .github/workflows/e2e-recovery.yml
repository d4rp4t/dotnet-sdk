name: E2E Recovery

on:
  workflow_call:

jobs:
  test:
    name: E2E Recovery Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - uses: ./.github/actions/e2e-setup
      - name: Run recovery E2E tests
        run: dotnet test NArk.Tests.End2End --no-build --verbosity normal --filter "TestCategory=Recovery"
        timeout-minutes: 30
      - name: Collect docker logs on failure
        if: failure()
        run: |
          docker logs arkd > /tmp/arkd-logs.txt 2>&1 || true
          docker logs boltz > /tmp/boltz-logs.txt 2>&1 || true
          docker logs bitcoin > /tmp/bitcoin-logs.txt 2>&1 || true
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-recovery
          path: /tmp/*-logs.txt
      - name: Stop infrastructure
        if: always()
        run: node regtest/regtest.mjs clean || true
